services:

  template_service:
    build:
      context: .
      dockerfile: Dockerfile
      target: development-image
    container_name: template_service
    env_file:
      - .env
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      postgresql:
        condition: service_healthy
      alembic:
        condition: service_completed_successfully
    profiles:
      - dev
      - app

  alembic:
    container_name: alembic
    build:
      context: .
      dockerfile: Dockerfile
      target: alembic-image
    env_file:
      - .env
    depends_on:
      postgresql:
        condition: service_healthy
    profiles:
      - dev

  template_service_prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: production-image
    container_name: template_service_prod
    env_file:
      - .env
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      postgresql:
        condition: service_healthy
      alembic_prod:
        condition: service_completed_successfully
    profiles:
      - prod

  alembic_prod:
    container_name: alembic_prod
    build:
      context: .
      dockerfile: Dockerfile
      target: alembic-image
    env_file:
      - .env
    depends_on:
      postgresql:
        condition: service_healthy
    profiles:
      - prod

  postgresql:
    image: "postgres:15-alpine3.20"
    container_name: postgresql
    ports:
      - "5432:5432"
    volumes:
      - postgres_volume_local:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES__DB}
      POSTGRES_USER: ${POSTGRES__USER}
      POSTGRES_PASSWORD: ${POSTGRES__PASSWORD}
      PG_DATA: ./local/pgdata
    healthcheck:
      test: [ "CMD-SHELL", "sh -c 'pg_isready -U ${POSTGRES__USER} -d ${POSTGRES__DB}'" ]
      interval: 10s
      timeout: 3s
      retries: 3
    profiles:
      - dev
      - db
      - prod

volumes:
  postgres_volume_local: